<?xml version="1.0" encoding="UTF-8"?>
<svg width="96" height="96" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF5E6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="512" cy="512" r="480" fill="url(#bgGradient)" />
  
  <!-- 外圈装饰 -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="#FF6B6B" stroke-width="8" opacity="0.2" />
  
  <!-- 房子主体 -->
  <g transform="translate(512, 480)">
    <!-- 房子底部 -->
    <rect x="-200" y="-50" width="400" height="300" rx="30" fill="#FF6B6B" filter="url(#shadow)" />
    
    <!-- 屋顶 -->
    <path d="M -220 -50 L 0 -250 L 220 -50 Z" fill="#FFA07A" />
    
    <!-- 烟囱 -->
    <rect x="120" y="-180" width="60" height="100" rx="10" fill="#FFA07A" />
    
    <!-- 门 -->
    <rect x="-60" y="80" width="120" height="170" rx="15" fill="#FFE4B5" />
    <circle cx="35" cy="165" r="12" fill="#FF6B6B" />
    
    <!-- 左窗 -->
    <rect x="-160" y="-20" width="80" height="80" rx="10" fill="#FFE4B5" />
    <path d="M -120 -20 L -120 60 M -160 20 L -80 20" stroke="#FF6B6B" stroke-width="6" />
    
    <!-- 右窗 -->
    <rect x="80" y="-20" width="80" height="80" rx="10" fill="#FFE4B5" />
    <path d="M 120 -20 L 120 60 M 80 20 L 160 20" stroke="#FF6B6B" stroke-width="6" />
  </g>
  
  <!-- 智能光环 -->
  <circle cx="512" cy="780" r="40" fill="#FFA07A" opacity="0.9" />
  <circle cx="512" cy="780" r="55" fill="none" stroke="#FFA07A" stroke-width="4" opacity="0.5" />
  <circle cx="512" cy="780" r="70" fill="none" stroke="#FFA07A" stroke-width="2" opacity="0.3" />
  
  <!-- 爱心装饰 -->
  <path d="M 280 350 C 280 320, 310 300, 340 320 C 370 300, 400 320, 400 350 C 400 380, 340 420, 340 420 C 340 420, 280 380, 280 350 Z" 
        fill="#FFA07A" opacity="0.8" transform="scale(0.6) translate(300, 200)" />
</svg>